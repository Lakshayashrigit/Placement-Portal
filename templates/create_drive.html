{% extends "layout.html" %}

{% block title %}Create Drive - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="fw-bold mb-4">Create Placement Drive</h2>
            <form method="POST" onsubmit="document.getElementById('submitBtn').disabled = true;">
                <div class="mb-3">
                    <label class="form-label">Job Title</label>
                    <input type="text" name="job_title" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Job Description</label>
                    <textarea name="job_description" class="form-control" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Eligibility Criteria</label>
                    <input type="text" name="eligibility" class="form-control"
                        placeholder="e.g. B.Tech CS/IT, No backlogs" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Minimum CGPA Required (0-10)</label>
                    <input type="number" step="0.01" min="0" max="10" name="min_cgpa" class="form-control" value="0.00" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Application Deadline</label>
                    <input type="date" name="deadline" class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" id="submitBtn" class="btn btn-primary px-4">Create Drive</button>
                    <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
