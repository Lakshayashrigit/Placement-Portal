{% extends "layout.html" %}

{% block title %}Login - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                <p class="text-center mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}"
                        class="text-primary text-decoration-none fw-medium">Register here</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
