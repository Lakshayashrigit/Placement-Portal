{% extends "layout.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="fw-bold mb-4">Edit Profile</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" value="{{ user.email }}" disabled>
                    <small class="text-muted">Email cannot be changed.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Current CGPA (0-10)</label>
                    <input type="number" step="0.01" min="0" max="10" name="cgpa" class="form-control" value="{{ user.cgpa if user.cgpa else '' }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Update Resume (PDF)</label>
                    <input type="file" name="resume" class="form-control" accept=".pdf">
                    {% if user.resume_path %}
                    <div class="mt-2 text-muted">
                        <a href="{{ url_for('static', filename='uploads/' + user.resume_path) }}" class="fw-bold"
                            target="_blank">View Current Resume</a>
                    </div>
                    {% else %}
                    <div class="mt-2">
                        <span class="badge bg-warning text-dark">No Resume Uploaded</span>
                    </div>
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Resume</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
