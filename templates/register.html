{% extends "layout.html" %}

{% block title %}Register - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h2 class="text-center mb-4 fw-bold">Create Account</h2>
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Register As</label>
                    <select name="role" class="form-select" id="roleSelector" onchange="toggleCompanyFields()">
                        <option value="student">Student</option>
                        <option value="company">Company</option>
                    </select>
                </div>

                <div id="companyFields" style="display: none;">
                    <hr class="my-4">
                    <h5 class="mb-3">Company Details</h5>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">HR Contact</label>
                            <input type="text" name="hr_contact" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Website</label>
                            <input type="url" name="website" class="form-control" placeholder="https://">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
                <p class="text-center mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}"
                        class="text-primary text-decoration-none fw-medium">Login here</a></p>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleCompanyFields() {
        const role = document.getElementById('roleSelector').value;
        const companyFields = document.getElementById('companyFields');
        companyFields.style.display = (role === 'company') ? 'block' : 'none';

        // Toggle required attribute
        const inputs = companyFields.querySelectorAll('input');
        inputs.forEach(input => {
            if (role === 'company') {
                if (input.name !== 'website') input.required = true;
            } else {
                input.required = false;
            }
        });
    }
</script>
{% endblock %}
